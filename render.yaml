services:
  - type: web
    name: wetalk-server
    env: java
    region: singapore
    plan: free
    branch: v4.0-java
    buildCommand: mvn package -DskipTests
    startCommand: java -jar target/wetalk-server-4.0.0-SNAPSHOT.jar --spring.profiles.active=dev
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: dev
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 8080
