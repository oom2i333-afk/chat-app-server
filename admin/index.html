<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeTalk 管理后台</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --primary: #1aad19;
    --primary-dark: #06b025;
    --danger: #e74c3c;
    --warning: #f39c12;
    --success: #27ae60;
    --bg: #f0f2f5;
    --card: #fff;
    --text: #1a1a2e;
    --text-secondary: #666;
    --border: #e8e8e8;
    --radius: 10px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh; overflow: hidden;
  }

  /* ─── 登录页 ─── */
  #loginPage {
    display:flex; align-items:center; justify-content:center;
    height:100vh; background:linear-gradient(135deg,#1aad19,#2ecc71);
  }
  .login-card {
    background:rgba(255,255,255,.96); border-radius:16px;
    padding:2rem; width:90%; max-width:380px;
    box-shadow:0 10px 50px rgba(0,0,0,.15);
  }
  .login-card h1 { text-align:center; font-size:1.5rem; margin-bottom:.3rem; }
  .login-card p { text-align:center; color:#999; font-size:.85rem; margin-bottom:1.5rem; }
  .login-card .input-group { margin-bottom:.8rem; }
  .login-card input {
    width:100%; padding:.75rem .9rem; border:1.5px solid var(--border);
    border-radius:10px; font-size:.9rem; outline:none; font-family:inherit;
    transition:border-color .2s;
  }
  .login-card input:focus { border-color:var(--primary); }
  .login-card .btn {
    width:100%; padding:.75rem; border:none; border-radius:10px;
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    color:#fff; font-size:.95rem; font-weight:600; cursor:pointer; font-family:inherit;
    transition:transform .15s, box-shadow .2s;
  }
  .login-card .btn:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(26,173,25,.35); }
  .login-card .btn:disabled { opacity:.6; cursor:not-allowed; transform:none; box-shadow:none; }
  .login-card .error { color:var(--danger); font-size:.82rem; text-align:center; margin-top:.5rem; }

  /* ─── 主界面 ─── */
  #dashboard { display:none; height:100vh; flex-direction:column; }

  /* ─── 顶栏 ─── */
  .topbar {
    background:var(--card); padding:.7rem 1.2rem;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .topbar h2 { font-size:1.1rem; font-weight:700; }
  .topbar .admin-info { font-size:.82rem; color:#888; display:flex; align-items:center; gap:.5rem; }
  .topbar .logout-btn {
    padding:.35rem .8rem; border:1px solid var(--border); border-radius:8px;
    background:none; color:#666; font-size:.8rem; cursor:pointer; font-family:inherit;
    transition:all .15s;
  }
  .topbar .logout-btn:hover { border-color:var(--danger); color:var(--danger); }

  /* ─── 统计卡片 ─── */
  .stats-row {
    display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:.6rem; padding:.8rem 1.2rem; flex-shrink:0;
  }
  .stat-card {
    background:var(--card); border-radius:var(--radius); padding:.8rem 1rem;
    box-shadow:0 1px 4px rgba(0,0,0,.04);
  }
  .stat-card .stat-num { font-size:1.5rem; font-weight:700; }
  .stat-card .stat-label { font-size:.78rem; color:#888; margin-top:2px; }
  .stat-card.total .stat-num { color:var(--primary); }
  .stat-card.online .stat-num { color:#3498db; }
  .stat-card.verified .stat-num { color:var(--success); }
  .stat-card.banned .stat-num { color:var(--danger); }
  .stat-card.pending .stat-num { color:var(--warning); }

  /* ─── 搜索/工具栏 ─── */
  .toolbar {
    display:flex; align-items:center; gap:.6rem; padding:0 1.2rem .5rem;
    flex-shrink:0; flex-wrap:wrap;
  }
  .toolbar input {
    flex:1; min-width:180px; padding:.5rem .75rem; border:1.5px solid var(--border);
    border-radius:8px; font-size:.82rem; outline:none; font-family:inherit;
    transition:border-color .2s;
  }
  .toolbar input:focus { border-color:var(--primary); }
  .toolbar .filter-btn {
    padding:.4rem .65rem; border:1.5px solid var(--border); border-radius:8px;
    background:var(--card); color:#666; font-size:.78rem; cursor:pointer;
    font-family:inherit; transition:all .15s; white-space:nowrap;
  }
  .toolbar .filter-btn:hover { border-color:#bbb; }
  .toolbar .filter-btn.active { border-color:var(--primary); color:var(--primary); background:rgba(26,173,25,.06); }

  /* ─── 用户列表 ─── */
  .table-wrap {
    flex:1; overflow-y:auto; padding:0 1.2rem .8rem;
  }
  .table-wrap::-webkit-scrollbar { width:5px; }
  .table-wrap::-webkit-scrollbar-thumb { background:#ccc; border-radius:3px; }

  table { width:100%; border-collapse:collapse; font-size:.82rem; }
  thead th {
    background:var(--card); padding:.55rem .5rem; text-align:left;
    font-weight:600; color:#888; font-size:.75rem;
    position:sticky; top:0; z-index:1;
    border-bottom:2px solid var(--border);
  }
  tbody td {
    padding:.5rem; border-bottom:1px solid #f0f0f0;
    background:var(--card); vertical-align:middle;
  }
  tbody tr:hover td { background:#fafafa; }

  .user-cell { display:flex; align-items:center; gap:.5rem; }
  .user-avatar {
    width:32px; height:32px; border-radius:8px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:.7rem; color:#fff;
  }
  .user-avatar img { width:100%; height:100%; border-radius:8px; object-fit:cover; }

  .badge {
    display:inline-flex; align-items:center; gap:.2rem;
    padding:.1rem .4rem; border-radius:20px; font-size:.7rem; font-weight:500;
  }
  .badge.verified { background:rgba(39,174,96,.1); color:var(--success); }
  .badge.pending { background:rgba(243,156,18,.1); color:var(--warning); }
  .badge.unverified { background:rgba(153,153,153,.1); color:#999; }
  .badge.active { background:rgba(26,173,25,.1); color:var(--primary); }
  .badge.banned { background:rgba(231,76,60,.1); color:var(--danger); }
  .badge.online { background:rgba(52,152,219,.1); color:#3498db; }
  .badge.offline { background:rgba(153,153,153,.08); color:#999; }

  .action-btn {
    padding:.25rem .55rem; border:none; border-radius:6px;
    font-size:.72rem; cursor:pointer; font-family:inherit;
    transition:opacity .15s; margin:0 2px;
  }
  .action-btn:hover { opacity:.8; }
  .action-btn.approve { background:rgba(39,174,96,.12); color:var(--success); }
  .action-btn.reject { background:rgba(231,76,60,.1); color:var(--danger); }
  .action-btn.ban { background:rgba(231,76,60,.1); color:var(--danger); }
  .action-btn.unban { background:rgba(39,174,96,.12); color:var(--success); }

  .status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:4px; }
  .status-dot.online { background:#1aad19; }
  .status-dot.offline { background:#ccc; }

  /* ─── Toast ─── */
  .toast-container {
    position:fixed; top:20px; left:50%; transform:translateX(-50%);
    z-index:9999; display:flex; flex-direction:column; align-items:center; gap:.3rem;
    pointer-events:none;
  }
  .toast {
    padding:.45rem 1rem; border-radius:20px;
    background:rgba(0,0,0,.8); color:#fff; font-size:.8rem;
    animation:toastIn .25s ease-out; backdrop-filter:blur(8px);
  }
  @keyframes toastIn { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }

  /* ─── 响应式 ─── */
  @media (max-width:768px) {
    .stats-row { grid-template-columns:repeat(2,1fr); padding:.6rem .8rem; }
    .toolbar { padding:0 .8rem .4rem; }
    .table-wrap { padding:0 .8rem .6rem; }
    table { font-size:.75rem; }
    td, th { padding:.4rem .3rem; }
  }
  @media (max-width:600px) {
    .hide-mobile { display:none; }
  }
</style>
</head>
<body>

<!-- ═══ 登录页 ═══ -->
<div id="loginPage">
  <div class="login-card">
    <h1>🔐 管理后台</h1>
    <p>WeTalk 用户与认证管理</p>
    <div class="input-group">
      <input type="text" id="adminUser" placeholder="管理员账号" autofocus>
    </div>
    <div class="input-group">
      <input type="password" id="adminPass" placeholder="管理员密码">
    </div>
    <button class="btn" id="loginBtn">登 录</button>
    <div class="error" id="loginError"></div>
  </div>
</div>

<!-- ═══ 主面板 ═══ -->
<div id="dashboard">
  <div class="topbar">
    <h2>📊 WeTalk 管理后台</h2>
    <div class="admin-info">
      <span id="adminName">admin</span>
      <button class="logout-btn" onclick="exportCSV()" style="margin-right:4px">📥 导出 CSV</button>
      <button class="logout-btn" id="logoutBtn">退出登录</button>
    </div>
  </div>

  <div class="stats-row" id="statsRow">
    <div class="stat-card total"><div class="stat-num" id="statTotal">0</div><div class="stat-label">总用户</div></div>
    <div class="stat-card online"><div class="stat-num" id="statOnline">0</div><div class="stat-label">在线</div></div>
    <div class="stat-card verified"><div class="stat-num" id="statVerified">0</div><div class="stat-label">已实名</div></div>
    <div class="stat-card pending"><div class="stat-num" id="statPending">0</div><div class="stat-label">待审核</div></div>
    <div class="stat-card banned"><div class="stat-num" id="statBanned">0</div><div class="stat-label">已封禁</div></div>
  </div>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="🔍 搜索用户名/手机号/姓名...">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="pending">待审核</button>
    <button class="filter-btn" data-filter="verified">已实名</button>
    <button class="filter-btn" data-filter="banned">已封禁</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:40px">#</th>
          <th>用户</th>
          <th class="hide-mobile">手机号</th>
          <th class="hide-mobile">实名信息</th>
          <th>状态</th>
          <th style="min-width:120px">操作</th>
        </tr>
      </thead>
      <tbody id="userTableBody"></tbody>
    </table>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const toastContainer = document.getElementById('toastContainer');
function showToast(msg, duration = 2000) {
  const el = document.createElement('div'); el.className = 'toast'; el.textContent = msg;
  toastContainer.appendChild(el);
  setTimeout(() => el.remove(), duration);
}

// ─── 状态 ───
let adminToken = localStorage.getItem('adminToken') || '';
let users = [];
let currentFilter = 'all';

// ─── DOM ───
const loginPage = document.getElementById('loginPage');
const dashboard = document.getElementById('dashboard');
const adminUser = document.getElementById('adminUser');
const adminPass = document.getElementById('adminPass');
const loginBtn = document.getElementById('loginBtn');
const loginError = document.getElementById('loginError');
const logoutBtn = document.getElementById('logoutBtn');
const adminName = document.getElementById('adminName');
const searchInput = document.getElementById('searchInput');
const userTableBody = document.getElementById('userTableBody');

// 统计
const statTotal = document.getElementById('statTotal');
const statOnline = document.getElementById('statOnline');
const statVerified = document.getElementById('statVerified');
const statPending = document.getElementById('statPending');
const statBanned = document.getElementById('statBanned');

// ─── 登录 ───
adminUser.addEventListener('keydown', e => { if (e.key === 'Enter') adminPass.focus(); });
adminPass.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
loginBtn.addEventListener('click', doLogin);

async function doLogin() {
  const username = adminUser.value.trim();
  const password = adminPass.value.trim();
  if (!username || !password) { loginError.textContent = '请输入账号和密码'; return; }

  loginBtn.disabled = true;
  loginBtn.textContent = '登录中...';
  loginError.textContent = '';

  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (data.success) {
      adminToken = data.token;
      localStorage.setItem('adminToken', data.token);
      adminName.textContent = data.admin.username;
      enterDashboard();
    } else {
      loginError.textContent = data.error || '登录失败';
    }
  } catch (e) {
    loginError.textContent = '网络错误';
  }
  loginBtn.disabled = false;
  loginBtn.textContent = '登 录';
}

// ─── 初始化 ───
if (adminToken) {
  // 验证 token 是否有效
  fetchUsers().then(ok => { if (ok) enterDashboard(); else showLogin(); });
} else {
  showLogin();
}

function showLogin() {
  loginPage.style.display = 'flex';
  dashboard.style.display = 'none';
}

function enterDashboard() {
  loginPage.style.display = 'none';
  dashboard.style.display = 'flex';
}

// ─── 退出 ───
logoutBtn.addEventListener('click', () => {
  adminToken = '';
  localStorage.removeItem('adminToken');
  showLogin();
});

// ─── 获取用户列表 ───
async function fetchUsers() {
  try {
    const res = await fetch('/api/admin/users', {
      headers: { 'x-admin-token': adminToken },
    });
    if (res.status === 401) { adminToken = ''; localStorage.removeItem('adminToken'); showLogin(); return false; }
    const data = await res.json();
    if (data.success) {
      users = data.users;
      updateStats(data.stats);
      renderUsers();
      return true;
    }
  } catch (e) { /* ignore */ }
  return false;
}

// ─── 更新统计 ───
function updateStats(stats) {
  statTotal.textContent = stats.total;
  statOnline.textContent = stats.online;
  statVerified.textContent = stats.verified;
  statPending.textContent = stats.pending;
  statBanned.textContent = stats.banned;
}

// ─── 渲染用户列表 ───
function renderUsers() {
  let filtered = [...users];

  // 搜索
  const q = searchInput.value.trim().toLowerCase();
  if (q) {
    filtered = filtered.filter(u =>
      u.name.toLowerCase().includes(q) ||
      u.phone.includes(q) ||
      (u.realName || '').toLowerCase().includes(q)
    );
  }

  // 筛选
  if (currentFilter === 'pending') filtered = filtered.filter(u => u.verificationStatus === 'pending');
  else if (currentFilter === 'verified') filtered = filtered.filter(u => u.realNameVerified);
  else if (currentFilter === 'banned') filtered = filtered.filter(u => u.status === 'banned');

  if (filtered.length === 0) {
    userTableBody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:2rem;color:#999">暂无数据</td></tr>';
    return;
  }

  userTableBody.innerHTML = filtered.map((u, i) => {
    const avatarHtml = u.avatar
      ? `<img src="${u.avatar}" alt="">`
      : (u.avatarChar || '?');
    const avatarBg = u.avatar ? '' : (u.avatarColor || '#666');

    // 实名状态
    let verifyBadge;
    if (u.realNameVerified) {
      verifyBadge = '<span class="badge verified">✓ 已认证</span>';
    } else if (u.verificationStatus === 'pending') {
      verifyBadge = '<span class="badge pending">⏳ 待审核</span>';
    } else {
      verifyBadge = '<span class="badge unverified">未认证</span>';
    }

    // 账户状态
    const accountBadge = u.status === 'banned'
      ? '<span class="badge banned">🔒 已封禁</span>'
      : '<span class="badge active">✓ 正常</span>';

    // 在线状态
    const onlineBadge = u.online
      ? '<span class="badge online"><span class="status-dot online"></span>在线</span>'
      : '<span class="badge offline"><span class="status-dot offline"></span>离线</span>';

    // 实名信息显示
    const realNameInfo = u.realName
      ? `${escapeHtml(u.realName)}<br><span style="font-size:.68rem;color:#999">${maskIdCard(u.idCard)}</span>`
      : '<span style="color:#999">—</span>';

    // 操作按钮
    let actions = '';

    // 认证操作
    if (u.verificationStatus === 'pending') {
      actions += `<button class="action-btn approve" onclick="verifyUser('${u.id}','approve')">✓ 通过</button>`;
      actions += `<button class="action-btn reject" onclick="verifyUser('${u.id}','reject')">✕ 拒绝</button>`;
    } else if (u.realNameVerified) {
      actions += `<button class="action-btn reject" onclick="verifyUser('${u.id}','reject')">撤销认证</button>`;
    } else {
      actions += '<span style="color:#ccc;font-size:.7rem">无申请</span>';
    }

    // 封禁/解封
    if (u.status === 'banned') {
      actions += `<button class="action-btn unban" onclick="toggleStatus('${u.id}','unban')">🔓 解封</button>`;
    } else {
      actions += `<button class="action-btn ban" onclick="toggleStatus('${u.id}','ban')">🔒 封禁</button>`;
    }

    return `
      <tr>
        <td style="color:#999;font-size:.7rem">${i + 1}</td>
        <td>
          <div class="user-cell">
            <div class="user-avatar" style="background:${avatarBg}">${avatarHtml}</div>
            <div>
              <strong>${escapeHtml(u.name)}</strong>
              <div style="font-size:.7rem;color:#999">ID: ${u.id.slice(-6)}</div>
            </div>
          </div>
        </td>
        <td class="hide-mobile">${maskPhone(u.phone)}</td>
        <td class="hide-mobile">${realNameInfo}</td>
        <td>
          <div style="display:flex;flex-direction:column;gap:2px">
            ${accountBadge}
            ${verifyBadge}
            ${onlineBadge}
          </div>
        </td>
        <td>
          <div style="display:flex;gap:3px;flex-wrap:wrap">${actions}</div>
        </td>
      </tr>
    `;
  }).join('');
}

function maskPhone(phone) {
  if (!phone) return '—';
  return phone.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2');
}

function maskIdCard(card) {
  if (!card) return '';
  return card.replace(/^(.{4}).+(.{4})$/, '$1****$2');
}

function escapeHtml(text) {
  if (!text) return '';
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// ─── 操作：审核认证 ───
async function verifyUser(userId, action) {
  const label = action === 'approve' ? '通过' : '拒绝';
  if (!confirm(`确定${label}该用户的实名认证？`)) return;

  try {
    const res = await fetch('/api/admin/verify-user', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-token': adminToken },
      body: JSON.stringify({ userId, action }),
    });
    const data = await res.json();
    if (data.success) {
      showToast(`已${label}认证`);
      fetchUsers();
    } else {
      showToast(data.error || '操作失败');
    }
  } catch (e) { showToast('网络错误'); }
}

// ─── 操作：封禁/解封 ───
async function toggleStatus(userId, action) {
  const label = action === 'ban' ? '封禁' : '解封';
  if (action === 'ban' && !confirm(`确定封禁该用户？用户将被强制下线。`)) return;
  if (action === 'unban' && !confirm(`确定解封该用户？`)) return;

  try {
    const res = await fetch('/api/admin/toggle-status', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-token': adminToken },
      body: JSON.stringify({ userId, action }),
    });
    const data = await res.json();
    if (data.success) {
      showToast(`已${label}用户`);
      fetchUsers();
    } else {
      showToast(data.error || '操作失败');
    }
  } catch (e) { showToast('网络错误'); }
}

// ─── 搜索 ───
let searchTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(renderUsers, 200);
});

// ─── 筛选 ───
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderUsers();
  });
});

// ─── 自动刷新 ───
let refreshTimer;
function startAutoRefresh() {
  refreshTimer = setInterval(fetchUsers, 30000);
}
function stopAutoRefresh() { clearInterval(refreshTimer); }
startAutoRefresh();

function exportCSV() {
  if (!adminToken) { showToast('请先登录'); return; }
  window.open('/api/admin/export?format=csv', '_blank');
}

console.log('📊 WeTalk 管理后台已加载');
</script>
</body>
</html>
