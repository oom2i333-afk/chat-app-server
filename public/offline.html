<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WeTalk - 离线</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #1aad19 0%, #148514 100%);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    text-align: center;
    padding: 2rem;
    -webkit-tap-highlight-color: transparent;
  }
  .icon {
    font-size: 80px;
    margin-bottom: 1.5rem;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 0.8rem; }
  p { font-size: 1rem; opacity: 0.9; line-height: 1.6; margin-bottom: 2rem; }
  .btn-retry {
    background: rgba(255,255,255,0.2);
    border: 2px solid rgba(255,255,255,0.4);
    color: #fff;
    padding: 12px 32px;
    border-radius: 24px;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: all 0.2s;
    touch-action: manipulation;
  }
  .btn-retry:active { background: rgba(255,255,255,0.35); transform: scale(0.95); }
  .detail { font-size: 0.78rem; opacity: 0.5; margin-top: 3rem; }
</style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>网络连接已断开</h1>
  <p>请检查网络连接后重试<br>部分离线缓存内容仍可正常浏览</p>
  <button class="btn-retry" onclick="window.location.reload()">重新连接</button>
  <div class="detail">WeTalk v2</div>
  <script>
    // Auto-retry when back online
    window.addEventListener('online', () => window.location.reload());
    // Also retry on click of the offline page
    document.addEventListener('click', () => {
      if (navigator.onLine) window.location.reload();
    });
  </script>
</body>
</html>
