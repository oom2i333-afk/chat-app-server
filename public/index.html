<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chat - 聊天</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ─── 登录页 ─── -->
<div id="loginPage" class="page active">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">💬</div>
      <h1>Chat</h1>
      <p>轻量聊天 · 随时随地</p>
    </div>
    <div class="login-form">
      <div class="input-group">
        <input type="text" id="loginName" placeholder="输入你的昵称" maxlength="12" autofocus>
      </div>
      <button id="loginBtn" class="btn-primary">登 录</button>
      <p class="login-tip">登录即表示同意《服务条款》</p>
    </div>
  </div>
</div>

<!-- ─── 主界面 ─── -->
<div id="mainPage" class="page">

  <!-- 左侧栏 -->
  <div id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Chat</div>
      <div class="header-actions">
        <button class="icon-btn" id="addContactBtn" title="添加联系人">➕</button>
        <button class="icon-btn" id="logoutBtn" title="退出">⏻</button>
      </div>
    </div>

    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchChat" placeholder="搜索聊天">
    </div>

    <!-- Tab 切换 -->
    <div class="tabs">
      <button class="tab active" data-tab="chats">💬 聊天</button>
      <button class="tab" data-tab="contacts">👥 通讯录</button>
    </div>

    <!-- 聊天列表 -->
    <div id="chatList" class="tab-content active scrollable"></div>

    <!-- 联系人列表 -->
    <div id="contactList" class="tab-content scrollable"></div>
  </div>

  <!-- 右侧聊天区域 -->
  <div class="chat-area">
    <!-- 无聊天选择时的空状态 -->
    <div id="emptyState" class="empty-state">
      <div class="empty-icon">💬</div>
      <p>选择一个好友开始聊天</p>
    </div>

    <!-- 聊天窗口 -->
    <div id="chatWindow" class="chat-window" style="display:none">
      <div class="chat-header">
        <button class="mobile-back" id="mobileBack">←</button>
        <div class="chat-header-avatar" id="chatAvatar">U</div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chatName">用户</div>
          <div class="chat-header-status" id="chatStatus">离线</div>
        </div>
      </div>

      <div class="messages-container" id="messagesContainer">
        <!-- 消息会动态渲染到这里 -->
      </div>

      <div class="typing-indicator" id="typingIndicator"></div>

      <div class="input-area">
        <button class="emoji-btn" id="emojiBtn">😊</button>
        <div class="input-wrapper">
          <input type="text" id="messageInput" placeholder="输入消息..." maxlength="500">
        </div>
        <button class="send-btn" id="sendBtn">发送</button>
      </div>
    </div>
  </div>
</div>

<!-- ─── Emoji 面板 ─── -->
<div id="emojiPanel" class="emoji-panel" style="display:none">
  <div class="emoji-grid" id="emojiGrid"></div>
</div>

<!-- ─── 添加联系人模态框 ─── -->
<div id="addContactModal" class="modal" style="display:none">
  <div class="modal-overlay" id="modalOverlay"></div>
  <div class="modal-content">
    <div class="modal-header">
      <h3>添加联系人</h3>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="input-group">
        <input type="text" id="searchUserInput" placeholder="搜索用户名..." autocomplete="off">
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
